<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topological 3BLD Viewer</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="app">
  <!-- Top Page -->
  <div id="top-page" class="page active">
    <h2>Topological 3BLD Viewer</h2>
    <div>Current Scramble:</div>
    <div id="current-scramble"></div>

    <div class="button-container">
      <button id="btn-copy" class="full-width">Copy Current Scramble</button>
      <button id="btn-generate" class="full-width">Generate Scramble</button>
    </div>

    <div>
      <input type="text" id="input-scramble" placeholder="Input Scramble (e.g. R U R' U')">
      <div id="error-msg">Input Invalid</div>
    </div>

    <div class="button-container">
      <button id="btn-apply">Apply Scramble</button>
      <button id="btn-view">Show Cube</button>
    </div>
  </div>

  <!-- View Page (展開図表示) -->
  <div id="view-page" class="page">
    <h2>Unfolded Diagram</h2>

    <div>Current Scramble:</div>
    <div id="view-scramble"></div>

    <div class="svg-container">

        <polygon id="DBR" points="0.2496,0.7488 0.7488,0.7488 0.8744,0.8744 0.2915,0.8744" fill="yellow"/>

        <!-- center (固定) -->

        <polygon id="L" points="-0.7488,-0.2496 -0.5973,-0.1991 -0.5973,0.1991 -0.7488,0.2496" fill="orange"/>
        <polygon id="F" points="-0.1303,-0.1303 0.1303,-0.1303 0.1303,0.1303 -0.1303,0.1303" fill="green"/>

    </div>
    <div class="button-container">
      <button id="btn-top" class="full-width">Top Page</button>
    </div>
  </div>
</div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
