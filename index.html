<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unfolded Diagram Generator for 3BLD</title>
<style>
  /* 基本スタイル */
  body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: #000;
    color: #fff;
    padding: 1rem;
    font-size: 1rem;
  }

  /* アプリのコンテナ */
  #app {
    max-width: 600px;
    margin: auto;
    padding: 16px;
  }

  /* 各ページ（Top / View）の切り替え用 */
  .page {
    display: none;
  }
  .page.active {
    display: block;
  }

  /* Scramble表示 */
  #current-scramble {
    font-size: 1.2rem;
    font-weight: bold;
    color: #4CAF50;
    margin: 16px 0;
    min-height: 3rem;
    word-wrap: break-word;
    letter-spacing: 2px;
  }

  /* 入力ウィンドウ */
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    font-size: 1.2rem;
    background: #222;
    color: #fff;
    border: 1px solid #555;
    margin-bottom: 8px;
  }

  /* エラーメッセージ */
  #error-msg {
    color: #ff5555;
    font-size: 0.9rem;
    height: 1.5rem;
    visibility: hidden;
    margin-bottom: 8px;
  }

  /* ボタンスタイル */
  button {
    padding: 12px 0;
    font-size: clamp(0.9rem, 4vw, 1.2rem);
    background: #222;
    color: #fff;
    border: 1px solid #555;
    width: 100%;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover {
    background: #333;
  }

  /* ボタンのグリッド・Flex配置 */
  .button-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (min-width: 400px) {
    .button-container {
      grid-template-columns: 1fr 1fr;
    }
    .full-width {
      grid-column: 1 / 3;
    }
  }

  /* SVG用のスタイル */
  .svg-container {
    background: #222;
    padding: 20px 0;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  svg {
    width: 100%;
    max-width: 500px;
    height: auto;
    display: block;
    margin: auto;
    background: #111;
  }
  polygon {
    stroke: #000;
    stroke-width: 0.01;
  }
</style>
</head>
<body>

<div id="app">
  <!-- Top Page -->
  <div id="top-page" class="page active">
    <h2>3BLD Inspection Training</h2>
    <div>Current Scramble:</div>
    <div id="current-scramble"></div>

    <div class="button-container">
      <button id="btn-generate" class="full-width">Generate Scramble</button>
    </div>

    <div>
      <input type="text" id="input-scramble" placeholder="Input Scramble (e.g. R U R' U')">
      <div id="error-msg">Input Invalid</div>
    </div>

    <div class="button-container">
      <button id="btn-apply">Apply Scramble</button>
      <button id="btn-view">View</button>
    </div>
  </div>

  <!-- View Page (展開図表示) -->
  <div id="view-page" class="page">
    <h2>Unfolded Diagram</h2>
    <div class="svg-container">
      <svg viewBox="-1 -1 2 2" xmlns="http://www.w3.org/2000/svg">
        <!-- edge -->
        <polygon id="UB" points="-0.2915,-0.8744 0.2915,-0.8744 0.2496,-0.7488 -0.2496,-0.7488" fill="white"/>
        <polygon id="UR" points="0.2496,-0.7488 0.7488,-0.7488 0.5973,-0.5973 0.1991,-0.5973" fill="white"/>
        <polygon id="UF" points="-0.1991,-0.5973 0.1991,-0.5973 0.1303,-0.391 -0.1303,-0.391" fill="white"/>

        <polygon id="FD" points="-0.1303,0.1303 0.1303,0.1303 0.1303,0.391 -0.1303,0.391" fill="green"/>

        <polygon id="RU" points="0.5973,-0.5973 0.7488,-0.7488 0.7488,-0.2496 0.5973,-0.1991" fill="red"/>
        <polygon id="RB" points="0.7488,-0.2496 0.8744,-0.2915 0.8744,0.2915 0.7488,0.2496" fill="red"/>
        <polygon id="RD" points="0.5973,0.1991 0.7488,0.2496 0.7488,0.7488 0.5973,0.5973" fill="red"/>
        <polygon id="RF" points="0.391,-0.1303 0.5973,-0.1991 0.5973,0.1991 0.391,0.1303" fill="red"/>
        <polygon id="BU" points="-0.2496,-1 0.2496,-1 0.2915,-0.8744 -0.2915,-0.8744" fill="blue"/>
        <polygon id="BL" points="-1,-0.2496 -0.8744,-0.2915 -0.8744,0.2915 -1,0.2496" fill="blue"/>
        <polygon id="BD" points="-0.2915,0.8744 0.2915,0.8744 0.2496,1 -0.2496,1" fill="blue"/>
        <polygon id="BR" points="0.8744,-0.2915 1,-0.2496 1,0.2496 0.8744,0.2915" fill="blue"/>

        <polygon id="DR" points="0.1991,0.5973 0.5973,0.5973 0.7488,0.7488 0.2496,0.7488" fill="yellow"/>
        <polygon id="DB" points="-0.2496,0.7488 0.2496,0.7488 0.2915,0.8744 -0.2915,0.8744" fill="yellow"/>
        <polygon id="DL" points="-0.5973,0.5973 -0.1991,0.5973 -0.2496,0.7488 -0.7488,0.7488" fill="yellow"/>

        <!-- corner -->
        <polygon id="UBL" points="-0.8744,-0.8744 -0.2915,-0.8744 -0.2496,-0.7488 -0.7488,-0.7488" fill="white"/>
        <polygon id="UBR" points="0.2915,-0.8744 0.8744,-0.8744 0.7488,-0.7488 0.2496,-0.7488" fill="white"/>
        <polygon id="UFR" points="0.1991,-0.5973 0.5973,-0.5973 0.391,-0.391 0.1303,-0.391" fill="white"/>
        <polygon id="UFL" points="-0.5973,-0.5973 -0.1991,-0.5973 -0.1303,-0.391 -0.391,-0.391" fill="white"/>
        <polygon id="LUB" points="-0.8744,-0.8744 -0.7488,-0.7488 -0.7488,-0.2496 -0.8744,-0.2915" fill="orange"/>
        <polygon id="LUF" points="-0.5973,-0.5973 -0.391,-0.391 -0.391,-0.1303 -0.5973,-0.1991" fill="orange"/>
        <polygon id="LDF" points="-0.5973,0.1991 -0.391,0.1303 -0.391,0.391 -0.5973,0.5973" fill="orange"/>
        <polygon id="LDB" points="-0.8744,0.2915 -0.7488,0.2496 -0.7488,0.7488 -0.8744,0.8744" fill="orange"/>
        <polygon id="FUL" points="-0.391,-0.391 -0.1303,-0.391 -0.1303,-0.1303 -0.391,-0.1303" fill="green"/>
        <polygon id="FUR" points="0.1303,-0.391 0.391,-0.391 0.391,-0.1303 0.1303,-0.1303" fill="green"/>
        <polygon id="FDR" points="0.1303,0.1303 0.391,0.1303 0.391,0.391 0.1303,0.391" fill="green"/>
        <polygon id="FDL" points="-0.391,0.1303 -0.1303,0.1303 -0.1303,0.391 -0.391,0.391" fill="green"/>
        <polygon id="RUF" points="0.391,-0.391 0.5973,-0.5973 0.5973,-0.1991 0.391,-0.1303" fill="red"/>
        <polygon id="RUB" points="0.7488,-0.7488 0.8744,-0.8744 0.8744,-0.2915 0.7488,-0.2496" fill="red"/>
        <polygon id="RDB" points="0.7488,0.2496 0.8744,0.2915 0.8744,0.8744 0.7488,0.7488" fill="red"/>
        <polygon id="RDF" points="0.391,0.1303 0.5973,0.1991 0.5973,0.5973 0.391,0.391" fill="red"/>
        <polygon id="BUR" points="0.3103,-0.9309 0.9309,-0.9309 0.9309,-0.3103 0.8744,-0.2915 0.8744,-0.8744 0.2915,-0.8744" fill="blue"/>
        <polygon id="BUL" points="-0.9309,-0.9309 -0.3103,-0.9309 -0.2915,-0.8744 -0.8744,-0.8744 -0.8744,-0.2915 -0.9309,-0.3103" fill="blue"/>
        <polygon id="BDL" points="-0.9309,0.3103 -0.8744,0.2915 -0.8744,0.8744 -0.2915,0.8744 -0.3103,0.9309 -0.9309,0.9309" fill="blue"/>
        <polygon id="BDR" points="0.8744,0.2915 0.9309,0.3103 0.9309,0.9309 0.3103,0.9309 0.2915,0.8744 0.8744,0.8744" fill="blue"/>
        <polygon id="DFL" points="-0.391,0.391 -0.1303,0.391 -0.1991,0.5973 -0.5973,0.5973" fill="yellow"/>
        <polygon id="DFR" points="0.1303,0.391 0.391,0.391 0.5973,0.5973 0.1991,0.5973" fill="yellow"/>
        <polygon id="DBR" points="0.2496,0.7488 0.7488,0.7488 0.8744,0.8744 0.2915,0.8744" fill="yellow"/>
        <polygon id="DBL" points="-0.7488,0.7488 -0.2496,0.7488 -0.2915,0.8744 -0.8744,0.8744" fill="yellow"/>

        <!-- center (固定) -->
        <polygon id="U" points="-0.2496,-0.7488 0.2496,-0.7488 0.1991,-0.5973 -0.1991,-0.5973" fill="white"/>
        <polygon id="L" points="-0.7488,-0.2496 -0.5973,-0.1991 -0.5973,0.1991 -0.7488,0.2496" fill="orange"/>
        <polygon id="F" points="-0.1303,-0.1303 0.1303,-0.1303 0.1303,0.1303 -0.1303,0.1303" fill="green"/>
        <polygon id="R" points="0.5973,-0.1991 0.7488,-0.2496 0.7488,0.2496 0.5973,0.1991" fill="red"/>
        <polygon id="D" points="-0.1991,0.5973 0.1991,0.5973 0.2496,0.7488 -0.2496,0.7488" fill="yellow"/>
      </svg>
    </div>
    <div class="button-container">
      <button id="btn-top" class="full-width">Top Page</button>
    </div>
  </div>
</div>

<script>
// --- State ---
const state = {
  scramble: "",
  cube: {
    edgeMap: new Array(24),
    cornerMap: new Array(24)
  }
};

// Map配列のインデックスに対応するSVG polygon ID
const edgeIds = [
  "UB", "UR", "UF", "UL", "LU", "LF", "LD", "LB", "FU", "FR", "FD", "FL", 
  "RU", "RB", "RD", "RF", "BU", "BL", "BD", "BR", "DF", "DR", "DB", "DL"
];
const cornerIds = [
  "UBL", "UBR", "UFR", "UFL", "LUB", "LUF", "LDF", "LDB", "FUL", "FUR", "FDR", "FDL", 
  "RUF", "RUB", "RDB", "RDF", "BUR", "BUL", "BDL", "BDR", "DFL", "DFR", "DBR", "DBL"
];

// 色適用ロジック
function getColorByStickerId(id) {
  if (id >= 0 && id <= 3) return "white";
  if (id >= 4 && id <= 7) return "orange";
  if (id >= 8 && id <= 11) return "green";
  if (id >= 12 && id <= 15) return "red";
  if (id >= 16 && id <= 19) return "blue";
  if (id >= 20 && id <= 23) return "yellow";
  return "black";
}

// 初期化関数
function initCube() {
  for (let i = 0; i < 24; i++) {
    state.cube.edgeMap[i] = i;
    state.cube.cornerMap[i] = i;
  }
}

// --- Cube 回転ロジック ---
function cycle(arr, indices) {
  const temp = arr[indices[0]];
  for (let i = 0; i < indices.length - 1; i++) {
    arr[indices[i]] = arr[indices[i + 1]];
  }
  arr[indices[indices.length - 1]] = temp;
}

function applyMoveLogic(cube, edgeCycles, cornerCycles) {
  const e = [...cube.edgeMap];
  const c = [...cube.cornerMap];
  edgeCycles.forEach(cyc => cycle(e, cyc));
  cornerCycles.forEach(cyc => cycle(c, cyc));
  cube.edgeMap = e;
  cube.cornerMap = c;
}

// R
function applyR(cube) { applyMoveLogic(cube, [[1,9,21,19],[12,15,14,13]], [[1,9,21,19],[16,2,10,22],[13,12,15,14]]); }
function applyR2(cube) { applyR(cube); applyR(cube); }
function applyRP(cube) { applyR(cube); applyR(cube); applyR(cube); }
// L
function applyL(cube) { applyMoveLogic(cube, [[3,17,23,11],[4,7,6,5]], [[0,18,20,8],[17,23,11,3],[4,7,6,5]]); }
function applyL2(cube) { applyL(cube); applyL(cube); }
function applyLP(cube) { applyL(cube); applyL(cube); applyL(cube); }
// U
function applyU(cube) { applyMoveLogic(cube, [[0,3,2,1],[16,4,8,12]], [[0,3,2,1],[17,5,9,13],[4,8,12,16]]); }
function applyU2(cube) { applyU(cube); applyU(cube); }
function applyUP(cube) { applyU(cube); applyU(cube); applyU(cube); }
// D
function applyD(cube) { applyMoveLogic(cube, [[20,23,22,21],[10,6,18,14]], [[20,23,22,21],[11,7,19,15],[6,18,14,10]]); }
function applyD2(cube) { applyD(cube); applyD(cube); }
function applyDP(cube) { applyD(cube); applyD(cube); applyD(cube); }
// F
function applyF(cube) { applyMoveLogic(cube, [[8,11,10,9],[2,5,20,15]], [[8,11,10,9],[3,6,21,12],[5,20,15,2]]); }
function applyF2(cube) { applyF(cube); applyF(cube); }
function applyFP(cube) { applyF(cube); applyF(cube); applyF(cube); }
// B
function applyB(cube) { applyMoveLogic(cube, [[16,19,18,17],[0,13,22,7]], [[16,19,18,17],[1,14,23,4],[13,22,7,0]]); }
function applyB2(cube) { applyB(cube); applyB(cube); }
function applyBP(cube) { applyB(cube); applyB(cube); applyB(cube); }

// 単一文字列に基づく適用
function applySingleMove(moveStr) {
  switch (moveStr.toUpperCase()) {
    case 'R': applyR(state.cube); break;
    case 'R2': applyR2(state.cube); break;
    case "R'": applyRP(state.cube); break;
    case 'L': applyL(state.cube); break;
    case 'L2': applyL2(state.cube); break;
    case "L'": applyLP(state.cube); break;
    case 'U': applyU(state.cube); break;
    case 'U2': applyU2(state.cube); break;
    case "U'": applyUP(state.cube); break;
    case 'D': applyD(state.cube); break;
    case 'D2': applyD2(state.cube); break;
    case "D'": applyDP(state.cube); break;
    case 'F': applyF(state.cube); break;
    case 'F2': applyF2(state.cube); break;
    case "F'": applyFP(state.cube); break;
    case 'B': applyB(state.cube); break;
    case 'B2': applyB2(state.cube); break;
    case "B'": applyBP(state.cube); break;
  }
}

// 完全なスクランブル文字列の適用
function applyScramble(scrambleStr) {
  initCube(); // 初期状態に戻す
  state.scramble = scrambleStr.toUpperCase();
  document.getElementById('current-scramble').innerText = state.scramble;
  
  if(state.scramble.trim() === "") return;

  const moves = state.scramble.split(" ");
  moves.forEach(m => applySingleMove(m));
  updateSVG();
}

// SVGの更新
function updateSVG() {
  for (let i = 0; i < 24; i++) {
    const edgePoly = document.getElementById(edgeIds[i]);
    const cornerPoly = document.getElementById(cornerIds[i]);
    if (edgePoly) edgePoly.setAttribute('fill', getColorByStickerId(state.cube.edgeMap[i]));
    if (cornerPoly) cornerPoly.setAttribute('fill', getColorByStickerId(state.cube.cornerMap[i]));
  }
}

// --- Scramble生成・検証 ---

// ムーブの軸を取得（0:U/D, 1:R/L, 2:F/B）
function getAxis(move) {
  const base = move.charAt(0).toUpperCase();
  if (base === 'U' || base === 'D') return 0;
  if (base === 'R' || base === 'L') return 1;
  if (base === 'F' || base === 'B') return 2;
  return -1;
}

// ランダムスクランブル生成
function generateRandomScramble() {
  const moveSets = [
    ["U", "U'", "U2", "D", "D'", "D2"],
    ["R", "R'", "R2", "L", "L'", "L2"],
    ["F", "F'", "F2", "B", "B'", "B2"]
  ];
  let scramble = [];
  let lastAxis = -1;

  for (let i = 0; i < 20; i++) {
    let axis;
    do {
      axis = Math.floor(Math.random() * 3);
    } while (axis === lastAxis);
    lastAxis = axis;
    const moves = moveSets[axis];
    const randomMove = moves[Math.floor(Math.random() * moves.length)];
    scramble.push(randomMove);
  }
  return scramble.join(" ");
}

// 入力文字列のバリデーション
function isValidScramble(str) {
  if (!str) return false;
  const moves = str.trim().split(" ");
  if (moves.length < 1 || moves.length > 30) return false;

  const validRegex = /^[UDRLFB][2\']?$/i;
  let lastAxis = -1;

  for (let i = 0; i < moves.length; i++) {
    const m = moves[i];
    if (!validRegex.test(m)) return false;
    const axis = getAxis(m);
    if (axis === -1 || axis === lastAxis) return false; // 無効文字 or 同一軸連続
    lastAxis = axis;
  }
  return true;
}

// --- イベント制御・UIロジック ---

function hideError() {
  document.getElementById('error-msg').style.visibility = 'hidden';
}

function showError() {
  document.getElementById('error-msg').style.visibility = 'visible';
}

document.getElementById('btn-generate').addEventListener('click', () => {
  hideError();
  document.getElementById('input-scramble').value = ""; // 入力ウィンドウをクリア
  const newScramble = generateRandomScramble();
  applyScramble(newScramble);
});

document.getElementById('btn-apply').addEventListener('click', () => {
  hideError();
  const inputEl = document.getElementById('input-scramble');
  const inputStr = inputEl.value;

  if (isValidScramble(inputStr)) {
    applyScramble(inputStr);
    inputEl.value = ""; // 成功時は空欄に戻す
  } else {
    showError();
  }
});

document.getElementById('btn-view').addEventListener('click', () => {
  hideError();
  document.getElementById('top-page').classList.remove('active');
  document.getElementById('view-page').classList.add('active');
});

document.getElementById('btn-top').addEventListener('click', () => {
  document.getElementById('view-page').classList.remove('active');
  document.getElementById('top-page').classList.add('active');
});

// アプリの初期化
window.onload = () => {
  const initialScramble = generateRandomScramble();
  applyScramble(initialScramble);
};

</script>
</body>
</html>
